<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <!-- Lens Icon -->
  <g id="icon">
    <!-- Outer circle -->
    <circle cx="25" cy="25" r="20" fill="none" stroke="#2563EB" stroke-width="3"/>
    <!-- Inner focus point -->
    <circle cx="25" cy="25" r="6" fill="#7C3AED"/>
    <!-- Crosshair lines -->
    <line x1="25" y1="8" x2="25" y2="15" stroke="#2563EB" stroke-width="2"/>
    <line x1="25" y1="35" x2="25" y2="42" stroke="#2563EB" stroke-width="2"/>
    <line x1="8" y1="25" x2="15" y2="25" stroke="#2563EB" stroke-width="2"/>
    <line x1="35" y1="25" x2="42" y2="25" stroke="#2563EB" stroke-width="2"/>
  </g>
  
  <!-- Brand Name -->
  <text x="55" y="32" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="600" fill="#1E293B">
    Lens
  </text>
</svg>
